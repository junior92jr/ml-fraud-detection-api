name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: web_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d web_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONPATH: .
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/web_test
      DATABASE_URI_TEST: postgres://postgres:postgres@localhost:5432/web_test
      MODEL_PATH: artifacts/model.joblib
      LOG_LEVEL: WARNING
      LOGFIRE_TOKEN: ""
      LOGFIRE_SERVICE_NAME: ml-fraud-detection-api
      LOGFIRE_ENVIRONMENT: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: make venv

      - name: Wait for PostgreSQL
        run: |
          uv run python - <<'PY'
          import asyncio
          import time
          import asyncpg

          uri = "postgres://postgres:postgres@localhost:5432/web_test"

          async def ready() -> bool:
              try:
                  conn = await asyncpg.connect(uri)
                  await conn.execute("SELECT 1")
                  await conn.close()
                  return True
              except Exception:
                  return False

          for _ in range(30):
              if asyncio.run(ready()):
                  raise SystemExit(0)
              time.sleep(2)

          raise SystemExit("PostgreSQL did not become ready in time")
          PY

      - name: Auto-fix style (must be clean)
        run: |
          make fix
          git diff --exit-code

      - name: Lint and type checks
        run: make check

      - name: Run tests
        run: make test
