services:
  app:
    build:
      context: .
      dockerfile: dockerfiles/app.dockerfile
    environment:
      PYTHONPATH: /workspace
      MODEL_PATH: /workspace/artifacts/model.joblib
      DATABASE_URI: postgres://postgres:postgres@web-db:5432/web
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      web-db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./deploy/nginx/certs:/etc/nginx/certs:ro
    networks:
      - frontend
      - backend

  web-db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  postgres-data:

networks:
  frontend:
  backend:
